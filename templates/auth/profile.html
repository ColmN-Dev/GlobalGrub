{% extends "base.html" %}

{% block content %}
    <h2>Your Profile</h2>
    <p>Welcome to your profile page {{ current_user.username }}!</p>
    <p>Username: {{ current_user.username }}</p>

    <div>
        <form method="POST" action="{{ url_for('logout') }}">
            <button type="submit" id="logout" class="user-button">Logout</button>
        </form>
    </div>


{% endblock %}
